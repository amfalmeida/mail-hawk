services:
  mail-hawk:
    build:
      context: .
      dockerfile: Dockerfile
    image: mail-hawk:latest
    container_name: mail-hawk
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - mail-hawk-data:/share/mail_hawk
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mail-hawk-data: