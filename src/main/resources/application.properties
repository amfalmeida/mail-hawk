# Database Configuration
# DB_TYPE can be: sqlite, mariadb
quarkus.datasource.db-kind=${DB_TYPE:sqlite}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:sqlite:/share/mail_hawk/mail_hawk.db}
quarkus.datasource.username=${DB_USERNAME:}
quarkus.datasource.password=${DB_PASSWORD:}
quarkus.datasource.jdbc.min-size=1
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# Mail Configuration
mail.host=imap.gmail.com
mail.port=993
mail.username=
mail.password=
mail.folder=INBOX
mail.days-older=30
mail.subject-filter=(?i)(.*)(fatura|factura|faturação|extracto|recibo|pagamento|talão)(.*)
mail.only-attachments=true
mail.max-emails=0
mail.pdf-passwords=
mail.debug=false

# Google Sheets Configuration
sheets.id=
sheets.sheet-name=Bills values
sheets.config-sheet=config
sheets.encoded-credentials=

# Application Configuration
app.db-path=share/mail_hawk/mail_hawk.db
app.check-interval=60
app.config-sync-interval=300
app.default-invoice-type=other

# Quarkus Configuration
quarkus.log.level=INFO
quarkus.log.console.json=false
quarkus.log.category."com.amfalmeida".level=DEBUG
quarkus.log.category."org.jboss".level=WARN
quarkus.log.category."com.google".level=WARN
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) [%X{id}] %s%e%n

# Scheduler Configuration - use dedicated thread pool
quarkus.scheduler.thread-pool.size=5
quarkus.scheduler.start-mode=normal

# Vertx Configuration - allow longer blocking operations for IMAP
quarkus.vertx.worker-pool.size=10
quarkus.vertx.max-event-loop-execute-time=10m
quarkus.vertx.warning-exception-time=10m
