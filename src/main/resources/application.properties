# Database Configuration
# DB_TYPE can be: sqlite, mariadb
quarkus.datasource.db-kind=${DB_TYPE:sqlite}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:sqlite:/share/mail_hawk/mail_hawk.db}
quarkus.datasource.username=${DB_USERNAME:}
quarkus.datasource.password=${DB_PASSWORD:}
quarkus.datasource.jdbc.min-size=1
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# Mail Configuration
mail.host=imap.gmail.com
mail.port=993
mail.username=
mail.password=
mail.folder=INBOX
mail.days-older=5
mail.subject-terms=fatura,factura,extracto,recibo
mail.only-attachments=true
mail.pdf-passwords=
mail.debug=false
mail.message-cache-size=10000
mail.message-cache-expire-days=${mail.days-older:30}

# Google Sheets Configuration
sheets.id=
sheets.sheet-name=values
sheets.config-sheet=config
sheets.recurrent-sheet=recurrent
sheets.encoded-credentials=

# Application Configuration
app.db-path=share/mail_hawk/mail_hawk.db
app.check-interval=60
app.config-sync-interval=300
app.default-invoice-type=other
app.recurrent-check-interval=360

# Quarkus Configuration
quarkus.log.level=INFO
quarkus.log.console.json=false
quarkus.log.category."com.amfalmeida".level=DEBUG
quarkus.log.category."org.jboss".level=WARN
quarkus.log.category."com.google".level=WARN
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) [%X{id}] %s%e%n

# Scheduler Configuration - use dedicated thread pool
quarkus.scheduler.start-mode=normal

# Vertx Configuration - allow longer blocking operations for IMAP
quarkus.vertx.worker-pool.size=10
quarkus.vertx.max-event-loop-execute-time=10m
quarkus.vertx.warning-exception-time=10m

# Actual Budget Configuration
actual.enabled=${ACTUAL_ENABLED:false}
actual.url=${ACTUAL_URL:}
actual.api-key=${ACTUAL_API_KEY:}
actual.budget-sync-id=${ACTUAL_BUDGET_SYNC_ID:}
actual.account-id=${ACTUAL_ACCOUNT_ID:}

# REST Client for Actual Budget
quarkus.rest-client.actual-budget.url=${ACTUAL_URL:http://localhost:5007}
quarkus.rest-client.actual-budget.connect-timeout=5000
quarkus.rest-client.actual-budget.read-timeout=30000

# Qute Configuration
quarkus.qute.default-charset=UTF-8

# HTTP Request/Response Logging for REST Client
quarkus.rest-client.logging.scope=request-response
quarkus.rest-client.logging.body-limit=10000
quarkus.rest-client.extensions-api.logging.scope=all
quarkus.log.category."org.jboss.resteasy.reactive.client".level=DEBUG
quarkus.log.category."io.vertx.core.http".level=DEBUG
