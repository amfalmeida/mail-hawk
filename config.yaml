name: "Mail Hawk"
version: "2.2.1"
url: "https://github.com/amfalmeida/mail-hawk"
slug: "mail_hawk"
image: ghcr.io/amfalmeida/mail-hawk
description: "Monitor email for invoice attachments, parse QR codes and store in database (Java/Quarkus)"
panel_icon: mdi:email-sync-outline
arch:
  - aarch64
  - amd64
init: false
boot: auto
startup: application
map:
  - share:rw
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Dashboard & Health check endpoint"
host_network: true
watchdog: http://[HOST]:[PORT:8080]/q/health/live
webui: http://[HOST]:[PORT:8080]/dashboard
ingress: true
ingress_port: 8080
panel_icon: mdi:email
panel_title: Mail Hawk
panel_admin: true
options:
  mail_imap_host: "imap.gmail.com"
  mail_imap_port: "993"
  mail_imap_username: ""
  mail_imap_password: ""
  mail_imap_folder: "INBOX"
  mail_imap_days_older: "30"
  mail_subject_terms: "fatura,factura,extracto,recibo"
  mail_listener_only_attachments: true
  mail_min_attachment_size: 0
  pdf_passwords: ""
  spreadsheet_id: ""
  spreadsheet_sheet: "values"
  spreadsheet_sheet_db: "config"
  spreadsheet_sheet_recurrent: "recurrent"
  google_auth_encoded: ""
  invoice_type_default: "other"
  db_type: "sqlite"
  db_url: "jdbc:sqlite:share/mail_hawk/mail_hawk.db"
  db_username: ""
  db_password: ""
  check_interval: "60"
  config_sync_interval: "300"
  recurrent_check_interval: "360"
  actual_enabled: false
  actual_url: ""
  actual_api_key: ""
  actual_budget_sync_id: ""
  actual_account_id: ""
schema:
  mail_imap_host: str
  mail_imap_port: str
  mail_imap_username: str
  mail_imap_password: password
  mail_imap_folder: str
  mail_imap_days_older: int
  mail_subject_terms: str
  mail_listener_only_attachments: bool
  mail_min_attachment_size: int
  pdf_passwords: password
  spreadsheet_id: str
  spreadsheet_sheet: str
  spreadsheet_sheet_db: str
  spreadsheet_sheet_recurrent: str
  google_auth_encoded: password
  invoice_type_default: str
  db_type: str
  db_url: str
  db_username: str
  db_password: password
  check_interval: int
  config_sync_interval: int
  recurrent_check_interval: int
  actual_enabled: bool
  actual_url: str
  actual_api_key: password
  actual_budget_sync_id: str
  actual_account_id: str
